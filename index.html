<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e11d48">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TreinoPro">
<title>TreinoPro</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e11d48;--red2:#fb7185;--red-dark:#9f0f2e;
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#f5f5f5;--muted:#777;--faint:#333;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* ── DIAGONAL ACCENT ── */
.diag{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),transparent)}

/* ── GENDER SCREEN ── */
#screenGender{background:var(--bg);position:relative}
.g-hero{flex:1;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 20px 0;position:relative;overflow:hidden}
.g-hero::before{content:'TREINO';position:absolute;right:-10px;top:50%;transform:translateY(-60%) rotate(90deg);font-family:'Bebas Neue',sans-serif;font-size:180px;color:rgba(255,255,255,.02);pointer-events:none;letter-spacing:8px;white-space:nowrap}
.g-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;line-height:1;color:var(--text);margin-bottom:2px}
.g-logo em{color:var(--red);font-style:normal}
.g-tagline{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px}
.g-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
.g-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;max-height:260px;margin-bottom:16px}
.g-card{border-radius:12px;border:1px solid var(--border2);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;padding:20px 16px;position:relative;overflow:hidden}
.g-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(225,29,72,.08),transparent);opacity:0;transition:opacity .2s}
.g-card:active{transform:scale(0.96)}
.g-card:active::after{opacity:1}
.g-card-icon{font-size:36px;filter:drop-shadow(0 0 12px rgba(225,29,72,.4))}
.g-card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text)}
.g-card-desc{font-size:11px;color:var(--muted);text-align:center;line-height:1.4;font-weight:600}
.g-card-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transition:transform .2s;transform-origin:left}
.g-card:active .g-card-line{transform:scaleX(1)}
.g-footer{text-align:center;padding:10px 0 env(safe-area-inset-bottom,12px);font-size:11px;color:var(--faint)}
.g-footer a{color:#333;text-decoration:none;letter-spacing:.05em}

/* ── HOME SCREEN ── */
#screenHome{background:var(--bg)}
.h-header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);position:relative}
.h-header .diag{top:0}
.h-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,12px) 16px 12px}
.h-back{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;font-weight:700}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;flex:1;color:var(--text)}
.h-logo em{color:var(--red);font-style:normal}
.h-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
.h-badge.m{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.h-badge.f{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.3)}
.h-section{padding:0 16px;flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.h-section::-webkit-scrollbar{display:none}
.h-group-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:10px}
.h-group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.h-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;position:relative;overflow:hidden}
.h-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transition:transform .2s;transform-origin:bottom}
.h-card:active{background:var(--bg3);transform:scale(0.99)}
.h-card:active::before{transform:scaleY(1)}
.h-card-icon{font-size:24px;flex-shrink:0;width:40px;height:40px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
.h-card-info{flex:1;min-width:0}
.h-card-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);line-height:1.1}
.h-card-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;font-weight:600}
.h-badge-sm{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.h-badge-sm.i{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.h-badge-sm.m-level{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.h-badge-sm.a{background:rgba(225,29,72,.1);color:#fb7185;border:1px solid rgba(225,29,72,.2)}
.h-badge-sm.s{background:rgba(236,72,153,.1);color:#f472b6;border:1px solid rgba(236,72,153,.2)}

/* ── PLAN SCREEN ── */
#screenPlan{background:var(--bg)}
.p-header{background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);position:relative}
.p-header .diag{top:0}
.p-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,12px) 16px 10px}
.p-back{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;font-weight:700}
.p-title{flex:1;min-width:0}
.p-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:10px;color:var(--muted);margin-top:1px;font-weight:600;letter-spacing:.05em}
.p-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);flex-shrink:0;font-weight:700}
.p-pill span{color:var(--red)}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--red)}
.pbar-wrap{padding:0 16px 8px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:var(--red);border-radius:2px;transition:width .4s ease}
.pbar-pct{font-size:11px;color:var(--muted);font-weight:700;min-width:28px;text-align:right}
.elist{flex:1;overflow-y:auto;padding:10px 16px 16px;-webkit-overflow-scrolling:touch}
.elist::-webkit-scrollbar{display:none}
.e-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;padding-top:4px}
.ecard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:all .15s;position:relative;overflow:hidden}
.ecard:active{background:var(--bg3);transform:scale(0.99)}
.ecard.done{border-color:var(--red-dark);background:rgba(159,15,46,.08)}
.ecard.done::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.e-num{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);flex-shrink:0;letter-spacing:1px}
.e-num.dn{background:rgba(225,29,72,.15);border-color:var(--red-dark);color:var(--red2)}
.e-info{flex:1;min-width:0}
.e-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.e-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.02em}
.e-play{width:34px;height:34px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.e-play svg{width:12px;height:12px;fill:#fff;margin-left:2px}
.e-done{width:34px;height:34px;border-radius:8px;background:rgba(225,29,72,.15);border:1px solid var(--red-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.e-done svg{width:14px;height:14px;stroke:var(--red2);fill:none;stroke-width:2.5}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;flex-direction:column}
.modal-bg.open{display:flex}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 14px;flex-shrink:0;border-bottom:1px solid var(--border)}
.modal-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);flex:1;padding-right:12px;line-height:1.2}
.modal-close{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;font-weight:700;flex-shrink:0}
.vid-wrap{width:100%;background:#000;flex-shrink:0}
.vid-wrap iframe{width:100%;height:100%;border:none;display:block}
.modal-body{padding:14px 16px;flex:1;overflow-y:auto}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--red2)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;font-weight:700}
.modal-acts{display:flex;gap:8px;padding-bottom:env(safe-area-inset-bottom,8px)}
.btn-done{flex:1;padding:14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.btn-done:active{background:var(--red-dark)}
.btn-done.un{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}
.btn-next{padding:14px 18px;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer}
.no-vid{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.screen.active .g-logo,.screen.active .g-tagline,.screen.active .g-label,.screen.active .g-cards{animation:fadeUp .4s ease both}
.screen.active .g-tagline{animation-delay:.05s}
.screen.active .g-label{animation-delay:.1s}
.screen.active .g-cards{animation-delay:.15s}
</style>
</head>
<body>

<!-- GENDER -->
<div class="screen active" id="screenGender">
  <div class="diag"></div>
  <div class="g-hero">
    <div class="g-logo">Treino<em>Pro</em></div>
    <div class="g-tagline">Seu treino. Sua evolução.</div>
    <div class="g-label">Selecione seu perfil</div>
    <div class="g-cards">
      <div class="g-card" onclick="setGender('m')">
        <div class="g-card-icon">💪</div>
        <div class="g-card-name">Homens</div>
        <div class="g-card-desc">Hipertrofia e força muscular</div>
        <div class="g-card-line"></div>
      </div>
      <div class="g-card" onclick="setGender('f')">
        <div class="g-card-icon">🏋️</div>
        <div class="g-card-name">Mulheres</div>
        <div class="g-card-desc">Glúteos, definição e hipertrofia</div>
        <div class="g-card-line"></div>
      </div>
    </div>
  </div>
  <div class="g-footer"><a href="https://github.com/romariomrk" target="_blank">github.com/romariomrk</a></div>
</div>

<!-- HOME -->
<div class="screen" id="screenHome">
  <div class="p-header">
    <div class="diag"></div>
    <div class="h-topbar" style="padding:env(safe-area-inset-top,12px) 16px 12px">
      <div class="h-back" onclick="goGender()">←</div>
      <div class="h-logo">Treino<em>Pro</em></div>
      <div class="h-badge" id="genderBadge"></div>
    </div>
  </div>
  <div class="h-section" id="levelSection"></div>
</div>

<!-- PLAN -->
<div class="screen" id="screenPlan">
  <div class="p-header">
    <div class="diag"></div>
    <div class="p-topbar">
      <div class="p-back" onclick="goHome()">←</div>
      <div class="p-title">
        <div class="p-name" id="planName"></div>
        <div class="p-meta" id="planMeta"></div>
      </div>
      <div class="p-pill" id="pill">0/<span>0</span></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="pbar-wrap">
      <div class="pbar"><div class="pbar-fill" id="pfill" style="width:0%"></div></div>
      <div class="pbar-pct" id="ppct">0%</div>
    </div>
  </div>
  <div class="elist" id="elist"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-hdr">
    <div class="modal-ttl" id="mtitle"></div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
  <div class="vid-wrap" id="vwrap"></div>
  <div class="modal-body">
    <div class="stats-row" id="mstats"></div>
    <div class="modal-acts">
      <button class="btn-done" id="bdone" onclick="toggleDone()"></button>
      <button class="btn-next" onclick="nextEx()">PRÓXIMO ›</button>
    </div>
  </div>
</div>

let gender=null,curPlan=null,curTab=0,curIdx=null,done={};
function dk(p,t,i){return p+'-'+t+'-'+i;}

function setGender(g){
  gender=g;
  const menu=MENUS[g];
  document.getElementById('genderBadge').textContent=menu.badge;
  document.getElementById('genderBadge').className='h-badge '+menu.cls;
  const plans=g==='m'?PLANS_H:PLANS_F;
  const labels=menu.labels;
  let html='';
  menu.groups.forEach(grp=>{
    html+=`<div class="h-group-title">${grp.title}</div>`;
    grp.plans.forEach(pid=>{
      const l=labels[pid];
      html+=`<div class="h-card" onclick="openPlan('${pid}')">
        <div class="h-card-icon">${l.icon}</div>
        <div class="h-card-info">
          <div class="h-card-name">${l.name}</div>
          <div class="h-card-desc">${l.desc}</div>
        </div>
        <div class="h-badge-sm ${l.cls}">${l.badge}</div>
      </div>`;
    });
  });
  document.getElementById('levelSection').innerHTML=html;
  document.getElementById('screenGender').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function goGender(){
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenGender').classList.add('active');
}

function openPlan(id){
  curPlan=id;curTab=0;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const p=plans[id];
  document.getElementById('planName').textContent=p.name;
  document.getElementById('planMeta').textContent=p.meta;
  renderTabs();renderList();
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenPlan').classList.add('active');
  document.getElementById('elist').scrollTop=0;
}

function goHome(){
  document.getElementById('screenPlan').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function renderTabs(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  document.getElementById('tabs').innerHTML=plans[curPlan].treinos.map((t,i)=>
    `<div class="tab${i===curTab?' active':''}" onclick="setTab(${i})">${t.label}</div>`).join('');
}

function setTab(i){curTab=i;renderTabs();renderList();document.getElementById('elist').scrollTop=0;}

function renderList(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  const dc=t.exercises.filter((_,i)=>done[dk(curPlan,curTab,i)]).length;
  const pct=Math.round(dc/t.exercises.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pill').innerHTML=dc+'/<span>'+t.exercises.length+'</span>';
  document.getElementById('elist').innerHTML=
    `<div class="e-label">${t.label} — ${t.sub}</div>`+
    t.exercises.map((ex,i)=>{
      const isDone=!!done[dk(curPlan,curTab,i)];
      return `<div class="ecard${isDone?' done':''}" onclick="openModal(${i})">
        <div class="e-num${isDone?' dn':''}">${i+1}</div>
        <div class="e-info">
          <div class="e-name">${ex.name}</div>
          <div class="e-sub">${ex.sets} séries · ${ex.reps} reps · ${ex.rest}</div>
        </div>
        <div class="${isDone?'e-done':'e-play'}">${isDone?'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'}</div>
      </div>`;
    }).join('');
}

async function fetchGif(vidKey) {
  const query = GIF_SEARCH[vidKey] || '';
  if (!query) return null;
  try {
    const res = await fetch(`https://exercisedb-api.vercel.app/api/v1/exercises/search?q=${encodeURIComponent(query)}&limit=1`);
    if (!res.ok) return null;
    const data = await res.json();
    const ex = data?.exercises?.[0] || data?.results?.[0] || data?.[0];
    return ex?.gifUrl || ex?.imageUrl || null;
  } catch(e) {
    return null;
  }
}

      <div style="color:#333;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Carregando GIF...</div>
    </div>
    ${ytId?`<div style="position:relative;width:100%;aspect-ratio:16/9"><iframe style="width:100%;height:100%;border:none;display:block" src="https://www.youtube.com/embed/${ytId}?rel=0&playsinline=1" allow="encrypted-media" allowfullscreen></iframe></div>`:''}
  `;
  // Fetch GIF async
  fetchGif(ex.vid).then(gifUrl => {
    const box = document.getElementById('gifBox');
    if (box) {
      if (gifUrl) {
        box.innerHTML = `<img src="${gifUrl}" style="width:100%;max-height:260px;object-fit:contain" alt="${ex.name}" loading="lazy">`;
      } else {
        box.style.display = 'none';
      }
    }
  });
  document.getElementById('mstats').innerHTML=
    `<div class="stat"><div class="stat-val">${ex.sets}</div><div class="stat-lbl">Séries</div></div>
     <div class="stat"><div class="stat-val">${ex.reps}</div><div class="stat-lbl">Reps</div></div>
     <div class="stat"><div class="stat-val">${ex.rest}</div><div class="stat-lbl">Descanso</div></div>`;
  const isDone=!!done[dk(curPlan,curTab,idx)];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'DESMARCAR':'MARCAR FEITO';
  b.className='btn-done'+(isDone?' un':'');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('vwrap').innerHTML='';
}

function toggleDone(){
  const k=dk(curPlan,curTab,curIdx);
  done[k]=!done[k];
  if(!done[k])delete done[k];
  const isDone=!!done[k];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'DESMARCAR':'MARCAR FEITO';
  b.className='btn-done'+(isDone?' un':'');
  renderList();
}

function nextEx(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  closeModal();
  setTimeout(()=>openModal((curIdx+1)%t.exercises.length),150);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
