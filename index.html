<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TreinoPro">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8f0;overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* GENDER SELECT */
.gender-wrap{flex:1;display:flex;flex-direction:column;padding:env(safe-area-inset-top,24px) 20px 20px}
.gender-logo{font-size:32px;font-weight:800;letter-spacing:-0.03em;color:#fff;margin-bottom:6px}
.gender-logo span{color:#a78bfa}
.gender-sub{font-size:13px;color:#555;margin-bottom:32px}
.gender-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;max-height:320px}
.gender-card{border-radius:20px;border:0.5px solid #2a2a35;background:#111115;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;padding:20px}
.gender-card:active{transform:scale(0.97)}
.gender-card.m-card{border-color:#1e3a50}
.gender-card.f-card{border-color:#3a1e3a}
.gender-emoji{font-size:48px}
.gender-name{font-size:16px;font-weight:700;color:#e8e8f0}
.gender-desc{font-size:11px;color:#555;text-align:center;line-height:1.4}

/* HOME */
.home-header{padding:env(safe-area-inset-top,12px) 20px 0;flex-shrink:0}
.home-topbar{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.home-back{width:32px;height:32px;border-radius:50%;background:#1a1a1f;border:0.5px solid #2a2a35;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#888;flex-shrink:0}
.home-logo{font-size:20px;font-weight:800;letter-spacing:-0.02em;color:#fff}
.home-logo span{color:#a78bfa}
.home-gender-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:700}
.home-gender-badge.m{background:#0d1a2a;color:#60a5fa;border:0.5px solid #1e3a50}
.home-gender-badge.f{background:#1a0d2a;color:#e879f9;border:0.5px solid #3a1e50}
.home-sub{font-size:12px;color:#555;margin-bottom:16px}
.level-section{padding:0 20px;flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.level-section::-webkit-scrollbar{display:none}
.level-group-title{font-size:11px;font-weight:700;color:#444;letter-spacing:.12em;text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.level-group-title::after{content:'';flex:1;height:0.5px;background:#1e1e28}
.level-card{background:#111115;border:0.5px solid #1e1e28;border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
.level-card:active{transform:scale(0.98)}
.level-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.i .level-icon{background:#0d2e18}
.m-level .level-icon{background:#1a1628}
.a .level-icon{background:#2a0e06}
.s .level-icon{background:#1a0d2a}
.level-info{flex:1;min-width:0}
.level-name{font-size:13px;font-weight:700;color:#e8e8f0;margin-bottom:2px}
.level-desc{font-size:11px;color:#555;line-height:1.5}
.level-badge{font-size:10px;padding:2px 8px;border-radius:100px;flex-shrink:0;font-weight:700;white-space:nowrap}
.i .level-badge{background:#0d2e18;color:#4ade80;border:0.5px solid #1a5c34}
.m-level .level-badge{background:#1a1628;color:#a78bfa;border:0.5px solid #3d2d70}
.a .level-badge{background:#2a0e06;color:#f97316;border:0.5px solid #7c2d12}
.s .level-badge{background:#1a0d2a;color:#e879f9;border:0.5px solid #5b21b6}

/* PLAN */
.plan-header{background:#0d0d0f;padding:env(safe-area-inset-top,12px) 16px 0;flex-shrink:0;border-bottom:0.5px solid #1e1e28}
.plan-top{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.back-btn{width:32px;height:32px;border-radius:50%;background:#1a1a1f;border:0.5px solid #2a2a35;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#888;flex-shrink:0}
.plan-title{flex:1;min-width:0}
.plan-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-meta{font-size:11px;color:#555;margin-top:1px}
.progress-pill{background:#1e1b2e;border:0.5px solid #3d2d70;border-radius:100px;padding:4px 12px;font-size:12px;color:#a78bfa;flex-shrink:0}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:#c4b5fd;border-bottom-color:#7c3aed}
.pbar-wrap{padding:8px 16px;background:#0d0d0f;flex-shrink:0}
.pbar{height:3px;background:#1a1a1f;border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:2px;transition:width .4s ease}
.elist{flex:1;overflow-y:auto;padding:8px 16px 16px;-webkit-overflow-scrolling:touch}
.elist::-webkit-scrollbar{display:none}
.slabel{font-size:11px;font-weight:600;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-top:4px}
.ecard{background:#111115;border:0.5px solid #1e1e28;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:all .15s}
.ecard:active{transform:scale(0.98);background:#161620}
.ecard.done{border-left:3px solid #7c3aed;border-radius:0 14px 14px 0}
.enum{width:30px;height:30px;border-radius:50%;background:#1e1b2e;border:0.5px solid #3d2d70;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#a78bfa;flex-shrink:0}
.enum.dn{background:#1e3a1e;border-color:#2a5a2a;color:#4ade80}
.einfo{flex:1;min-width:0}
.ename{font-size:14px;font-weight:600;color:#e8e8f0;line-height:1.3}
.esub{font-size:12px;color:#555;margin-top:3px}
.pbtn{width:32px;height:32px;border-radius:50%;background:#1e1b2e;border:0.5px solid #3d2d70;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptri{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid #a78bfa;margin-left:2px}
.dbtn{width:32px;height:32px;border-radius:50%;background:#1e3a1e;border:0.5px solid #2a5a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dbtn::after{content:'';width:6px;height:10px;border:2.5px solid #4ade80;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;flex-direction:column}
.modal-bg.open{display:flex}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 12px;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;color:#e8e8f0;flex:1;padding-right:12px;line-height:1.3}
.close-btn{width:34px;height:34px;border-radius:50%;background:#1a1a1f;border:0.5px solid #2a2a35;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:18px;flex-shrink:0}
.vid-container{width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0}
.vid-container iframe{width:100%;height:100%;border:none;display:block}
.modal-info{padding:12px 16px;flex:1;overflow-y:auto}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#111115;border:0.5px solid #1e1e28;border-radius:10px;padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:#c4b5fd}
.stat-lbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.modal-actions{display:flex;gap:8px;padding-bottom:env(safe-area-inset-bottom,8px)}
.btn-done{flex:1;padding:14px;background:#1e3a1e;color:#4ade80;border:0.5px solid #2a5a2a;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-done.un{background:#1a1a1f;color:#666;border-color:#2a2a35}
.btn-next{padding:14px 20px;background:#1e1b2e;color:#a78bfa;border:0.5px solid #3d2d70;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.no-vid{display:flex;align-items:center;justify-content:center;height:100%;color:#333;font-size:13px}
.footer{text-align:center;padding:8px 0 env(safe-area-inset-bottom,8px);font-size:11px;color:#2a2a35;flex-shrink:0}
.footer a{color:#3d2d70;text-decoration:none}
</style>
</head>

<!-- GENDER SELECT -->
<div class="screen active" id="screenGender">
  <div class="gender-wrap" style="padding-bottom:0">
    <div class="gender-logo">Treino<span>Pro</span></div>
    <div class="gender-sub">Selecione seu perfil de treino</div>
    <div class="gender-cards">
      <div class="gender-card m-card" onclick="setGender('m')">
        <div class="gender-emoji">💪</div>
        <div class="gender-name">Homens</div>
        <div class="gender-desc">Hipertrofia e força muscular</div>
      </div>
      <div class="gender-card f-card" onclick="setGender('f')">
        <div class="gender-emoji">🏋️</div>
        <div class="gender-name">Mulheres</div>
        <div class="gender-desc">Definição, glúteos e hipertrofia</div>
      </div>
    </div>
    <div class="footer"><a href="https://github.com/romariomrk" target="_blank">github.com/romariomrk</a></div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screenHome">
  <div class="home-header">
    <div class="home-topbar">
      <div class="home-back" onclick="goGender()">←</div>
      <div class="home-logo">Treino<span>Pro</span></div>
      <div class="home-gender-badge" id="genderBadge"></div>
    </div>
    <div class="home-sub">Escolha seu plano de treino</div>
  </div>
  <div class="level-section" id="levelSection"></div>
</div>

<!-- PLAN -->
<div class="screen" id="screenPlan">
  <div class="plan-header">
    <div class="plan-top">
      <div class="back-btn" onclick="goHome()">←</div>
      <div class="plan-title">
        <div class="plan-name" id="planName"></div>
        <div class="plan-meta" id="planMeta"></div>
      </div>
      <div class="progress-pill" id="pill">0/0</div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" id="pfill" style="width:0%"></div></div></div>
  </div>
  <div class="elist" id="elist"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-header">
    <div class="modal-title" id="mtitle"></div>
    <div class="close-btn" onclick="closeModal()">✕</div>
  </div>
  <div class="vid-container" id="vwrap"></div>
  <div class="modal-info">
    <div class="stats-row" id="mstats"></div>
    <div class="modal-actions">
      <button class="btn-done" id="bdone" onclick="toggleDone()"></button>
      <button class="btn-next" onclick="nextEx()">Próximo ›</button>
    </div>
  </div>
</div>

let gender=null,curPlan=null,curTab=0,curIdx=null,done={};
function dk(p,t,i){return p+'-'+t+'-'+i;}

function setGender(g){
  gender=g;
  const menu=MENUS[g];
  document.getElementById('genderBadge').textContent=menu.badge;
  document.getElementById('genderBadge').className='home-gender-badge '+menu.cls;
  const plans=g==='m'?PLANS_H:PLANS_F;
  const labels=menu.labels;
  let html='';
  menu.groups.forEach(grp=>{
    html+=`<div class="level-group-title">${grp.title}</div>`;
    grp.plans.forEach(pid=>{
      const l=labels[pid];
      html+=`<div class="level-card ${l.cls}" onclick="openPlan('${pid}')">
        <div class="level-icon">${l.icon}</div>
        <div class="level-info">
          <div class="level-name">${l.name}</div>
          <div class="level-desc">${l.desc}</div>
        </div>
        <div class="level-badge">${l.badge}</div>
      </div>`;
    });
  });
  document.getElementById('levelSection').innerHTML=html;
  document.getElementById('screenGender').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function goGender(){
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenGender').classList.add('active');
}

function openPlan(id){
  curPlan=id;curTab=0;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const p=plans[id];
  document.getElementById('planName').textContent=p.name;
  document.getElementById('planMeta').textContent=p.meta;
  renderTabs();renderList();
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenPlan').classList.add('active');
  document.getElementById('elist').scrollTop=0;
}

function goHome(){
  document.getElementById('screenPlan').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function renderTabs(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  document.getElementById('tabs').innerHTML=plans[curPlan].treinos.map((t,i)=>
    `<div class="tab${i===curTab?' active':''}" onclick="setTab(${i})">${t.label}</div>`).join('');
}

function setTab(i){curTab=i;renderTabs();renderList();document.getElementById('elist').scrollTop=0;}

function renderList(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  const dc=t.exercises.filter((_,i)=>done[dk(curPlan,curTab,i)]).length;
  const pct=Math.round(dc/t.exercises.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('pill').textContent=dc+'/'+t.exercises.length;
  document.getElementById('elist').innerHTML=
    `<div class="slabel">${t.label} — ${t.sub}</div>`+
    t.exercises.map((ex,i)=>{
      const isDone=!!done[dk(curPlan,curTab,i)];
      return `<div class="ecard${isDone?' done':''}" onclick="openModal(${i})">
        <div class="enum${isDone?' dn':''}">${i+1}</div>
        <div class="einfo">
          <div class="ename">${ex.name}</div>
          <div class="esub">${ex.sets} séries · ${ex.reps} reps · ${ex.rest}</div>
        </div>
        <div class="${isDone?'dbtn':'pbtn'}">${isDone?'':'<div class="ptri"></div>'}</div>
      </div>`;
    }).join('');
}

function openModal(idx){
  curIdx=idx;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const ex=plans[curPlan].treinos[curTab].exercises[idx];
  const ytId=YT[ex.vid]||'';
  document.getElementById('mtitle').textContent=ex.name;
  document.getElementById('vwrap').innerHTML=ytId
    ?`<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`
    :`<div class="no-vid">🎬 Vídeo em breve</div>`;
  document.getElementById('mstats').innerHTML=
    `<div class="stat"><div class="stat-val">${ex.sets}</div><div class="stat-lbl">Séries</div></div>
     <div class="stat"><div class="stat-val">${ex.reps}</div><div class="stat-lbl">Reps</div></div>
     <div class="stat"><div class="stat-val">${ex.rest}</div><div class="stat-lbl">Descanso</div></div>`;
  const isDone=!!done[dk(curPlan,curTab,idx)];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'✓ Desmarcar':'✓ Marcar como feito';
  b.className='btn-done'+(isDone?' un':'');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('vwrap').innerHTML='';
}

function toggleDone(){
  const k=dk(curPlan,curTab,curIdx);
  done[k]=!done[k];
  if(!done[k])delete done[k];
  const isDone=!!done[k];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'✓ Desmarcar':'✓ Marcar como feito';
  b.className='btn-done'+(isDone?' un':'');
  renderList();
}

function nextEx(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  closeModal();
  setTimeout(()=>openModal((curIdx+1)%t.exercises.length),150);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
