*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0d0d0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column;height:100dvh;color:#e8e8f0}

/* HEADER */
.header{background:#0d0d0f;padding:env(safe-area-inset-top,12px) 16px 0;flex-shrink:0;border-bottom:0.5px solid #1e1e28}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:#fff}
.logo span{color:#a78bfa}
.progress-pill{background:#1e1b2e;border:0.5px solid #3d2d70;border-radius:100px;padding:4px 12px;font-size:12px;color:#a78bfa}

/* GROUPS NAV */
.gnav{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;flex-shrink:0;scrollbar-width:none;background:#0d0d0f}
.gnav::-webkit-scrollbar{display:none}
.gbtn{flex-shrink:0;padding:8px 16px;border-radius:100px;border:0.5px solid #2a2a35;background:#111115;color:#666;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:500}
.gbtn.active{background:#1e1b2e;border-color:#7c3aed;color:#c4b5fd}

/* PROGRESS BAR */
.pbar-wrap{padding:0 16px 10px;flex-shrink:0;background:#0d0d0f}
.pbar-info{display:flex;justify-content:space-between;font-size:11px;color:#444;margin-bottom:5px}
.pbar{height:3px;background:#1a1a1f;border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:2px;transition:width .4s ease}

/* EXERCISE LIST */
.elist{flex:1;overflow-y:auto;padding:8px 16px 16px;-webkit-overflow-scrolling:touch}
.elist::-webkit-scrollbar{display:none}
.section-label{font-size:11px;font-weight:600;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-top:4px}
.ecard{background:#111115;border:0.5px solid #1e1e28;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;margin-bottom:8px;-webkit-tap-highlight-color:transparent;active:scale(0.98)}
.ecard:active{transform:scale(0.98);background:#161620}
.ecard.done{border-left:3px solid #7c3aed;border-radius:0 14px 14px 0}
.enum{width:30px;height:30px;border-radius:50%;background:#1e1b2e;border:0.5px solid #3d2d70;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#a78bfa;flex-shrink:0}
.enum.dn{background:#1e3a1e;border-color:#2a5a2a;color:#4ade80}
.einfo{flex:1;min-width:0}
.ename{font-size:14px;font-weight:600;color:#e8e8f0;line-height:1.3}
.esub{font-size:12px;color:#555;margin-top:3px}
.pbtn{width:32px;height:32px;border-radius:50%;background:#1e1b2e;border:0.5px solid #3d2d70;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptri{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:10px solid #a78bfa;margin-left:2px}
.dbtn{width:32px;height:32px;border-radius:50%;background:#1e3a1e;border:0.5px solid #2a5a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dbtn::after{content:'';width:6px;height:10px;border:2.5px solid #4ade80;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;flex-direction:column}
.modal-bg.open{display:flex}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 12px;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;color:#e8e8f0;flex:1;padding-right:12px;line-height:1.3}
.close-btn{width:32px;height:32px;border-radius:50%;background:#1a1a1f;border:0.5px solid #2a2a35;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:18px;flex-shrink:0}
.vid-container{width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0}
.vid-container iframe{width:100%;height:100%;border:none;display:block}
.modal-info{padding:12px 16px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#111115;border:0.5px solid #1e1e28;border-radius:10px;padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:#c4b5fd}
.stat-lbl{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.modal-actions{display:flex;gap:8px;padding-bottom:env(safe-area-inset-bottom,16px)}
.btn-done{flex:1;padding:14px;background:#1e3a1e;color:#4ade80;border:0.5px solid #2a5a2a;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-done:active{transform:scale(0.97)}
.btn-done.un{background:#1a1a1f;color:#666;border-color:#2a2a35}
.btn-next{padding:14px 20px;background:#1e1b2e;color:#a78bfa;border:0.5px solid #3d2d70;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>

  <div class="gnav" id="gnav"></div>

<div class="modal-bg" id="modal">

    {name:'Abdominal Infra',sets:'3',reps:'15-20',vid:'AbdominalInfra'},
    {name:'Elevação de Pernas',sets:'3',reps:'15-20',vid:'ElevacaoDePernas'},
    {name:'Prancha Abdominal',sets:'3',reps:'30-60s',vid:'PranchaAbdominal'},
    {name:'Prancha com Escalador',sets:'3',reps:'30-60s',vid:'PranchaComEscalador'},
  ]},
];

let curG=0,curIdx=null,done={};
function dk(g,i){return g+'-'+i;}
function getYtId(vid){return YT[vid]||'';}

function renderNav(){
  document.getElementById('gnav').innerHTML=GROUPS.map((g,i)=>
    `<button class="gbtn${i===curG?' active':''}" onclick="setG(${i})">${g.label}</button>`).join('');
}

function setG(i){curG=i;renderNav();renderList();}

function renderList(){
  const g=GROUPS[curG];
  const dc=g.exercises.filter((_,i)=>done[dk(curG,i)]).length;
  const pct=Math.round(dc/g.exercises.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('plabel').textContent=g.label.replace(/[^\w\s]/g,'').trim()+' — '+g.exercises.length+' exercícios';
  document.getElementById('pill').textContent=dc+' / '+g.exercises.length;
  document.getElementById('elist').innerHTML=
    `<div class="section-label">${g.label}</div>`+
    g.exercises.map((ex,i)=>{
      const isDone=!!done[dk(curG,i)];
      return `<div class="ecard${isDone?' done':''}" onclick="openModal(${i})">
        <div class="enum${isDone?' dn':''}">${i+1}</div>
        <div class="einfo">
          <div class="ename">${ex.name}</div>
          <div class="esub">${ex.sets} séries · ${ex.reps} reps · descanso 60-90s</div>
        </div>
        <div class="${isDone?'dbtn':'pbtn'}">${isDone?'':'<div class="ptri"></div>'}</div>
      </div>`;
    }).join('');
}

function openModal(idx){
  curIdx=idx;
  const ex=GROUPS[curG].exercises[idx];
  const ytId=getYtId(ex.vid);
  document.getElementById('mtitle').textContent=ex.name;
  document.getElementById('vwrap').innerHTML=ytId
    ?`<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`
    :`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#444;font-size:13px;background:#000">Vídeo em breve</div>`;
  document.getElementById('mstats').innerHTML=
    `<div class="stat"><div class="stat-val">${ex.sets}</div><div class="stat-lbl">Séries</div></div>
     <div class="stat"><div class="stat-val">${ex.reps}</div><div class="stat-lbl">Reps</div></div>
     <div class="stat"><div class="stat-val">90s</div><div class="stat-lbl">Descanso</div></div>`;
  const isDone=!!done[dk(curG,idx)];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'✓ Desmarcar':'✓ Marcar como feito';
  b.className='btn-done'+(isDone?' un':'');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('vwrap').innerHTML='';
  document.body.style.overflow='';
}

function toggleDone(){
  const k=dk(curG,curIdx);
  done[k]=!done[k];
  if(!done[k])delete done[k];
  const isDone=!!done[k];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'✓ Desmarcar':'✓ Marcar como feito';
  b.className='btn-done'+(isDone?' un':'');
  renderList();
}

function nextEx(){
  const next=(curIdx+1)%GROUPS[curG].exercises.length;
  closeModal();
  setTimeout(()=>openModal(next),150);
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderNav();
renderList();
</script>
</body>
</html>
