<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e11d48">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TreinoPro">
<title>TreinoPro</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e11d48;--red2:#ff4d6d;--red-dark:#9f0f2e;--red-glow:rgba(225,29,72,.35);
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--bg4:#242424;
  --border:#2a2a2a;--border2:#383838;
  --text:#f0f0f0;--muted:#666;--faint:#2a2a2a;
  --gold:#f59e0b;--steel:#94a3b8;
  --gym-bg: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,.012) 2px,
    rgba(255,255,255,.012) 4px
  ),
  repeating-linear-gradient(
    90deg,
    transparent,
    transparent 40px,
    rgba(255,255,255,.006) 40px,
    rgba(255,255,255,.006) 41px
  );
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh;background:#0d0d0d}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;position:relative}
.screen.active{display:flex}

/* ── GYM BACKGROUND ── */
.gym-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(225,29,72,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(180,20,50,.1) 0%, transparent 50%),
    var(--gym-bg),
    #0d0d0d;
}
.gym-bg::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent 0px,
    transparent 18px,
    rgba(255,255,255,.008) 18px,
    rgba(255,255,255,.008) 19px
  );
}
.screen > *:not(.gym-bg){position:relative;z-index:1}

/* ── DIAGONAL ACCENT ── */
.diag{position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),rgba(225,29,72,.3),transparent);
  box-shadow:0 0 12px rgba(225,29,72,.5);z-index:10}

/* ── GENDER SCREEN ── */
#screenGender{background:var(--bg)}
.g-hero{flex:1;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 20px 0;position:relative;overflow:hidden}
.g-hero::before{content:'POWER';position:absolute;right:-20px;top:40%;transform:translateY(-50%) rotate(90deg);
  font-family:'Bebas Neue',sans-serif;font-size:200px;
  color:transparent;-webkit-text-stroke:1px rgba(225,29,72,.07);
  pointer-events:none;letter-spacing:8px;white-space:nowrap}
.g-logo{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;line-height:1;color:var(--text);margin-bottom:4px;
  text-shadow:0 0 40px rgba(225,29,72,.3)}
.g-logo em{color:var(--red);font-style:normal;text-shadow:0 0 20px rgba(225,29,72,.6)}
.g-tagline{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:32px}
.g-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:10px}
.g-label::before,.g-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2))}
.g-label::after{background:linear-gradient(90deg,var(--border2),transparent)}
.g-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;max-height:280px;margin-bottom:20px}
.g-card{border-radius:14px;border:1px solid var(--border2);
  background:linear-gradient(145deg,var(--bg3),var(--bg2));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;transition:all .25s;padding:24px 16px;position:relative;overflow:hidden}
.g-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(225,29,72,.12),transparent 60%);opacity:0;transition:opacity .25s}
.g-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--red2));
  transform:scaleX(0);transition:transform .25s;transform-origin:left;
  box-shadow:0 0 8px var(--red-glow)}
.g-card:active{transform:scale(0.95);border-color:var(--red-dark)}
.g-card:active::before{opacity:1}
.g-card:active::after{transform:scaleX(1)}
.g-card-icon{font-size:48px;filter:drop-shadow(0 0 16px rgba(225,29,72,.5));line-height:1}
.g-card-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--text)}
.g-card-desc{font-size:10px;color:var(--muted);text-align:center;line-height:1.5;font-weight:700;letter-spacing:.05em}
.g-footer{text-align:center;padding:10px 0 env(safe-area-inset-bottom,14px);font-size:11px;color:var(--faint)}
.g-footer a{color:#2a2a2a;text-decoration:none;letter-spacing:.05em}

/* ── HEADER SHARED ── */
.h-header,.p-header{background:rgba(13,13,13,.95);flex-shrink:0;border-bottom:1px solid var(--border);position:relative;
  backdrop-filter:blur(10px)}
.h-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,12px) 16px 12px}
.h-back,.p-back{width:36px;height:36px;border-radius:9px;
  background:linear-gradient(145deg,var(--bg3),var(--bg2));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;font-weight:700;transition:all .15s}
.h-back:active,.p-back:active{background:var(--bg4);color:var(--text);border-color:var(--red-dark)}
.h-logo,.p-name-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;flex:1;color:var(--text)}
.h-logo em{color:var(--red);font-style:normal}
.h-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:.12em;text-transform:uppercase;flex-shrink:0}
.h-badge.m{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.h-badge.f{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.3)}

/* ── HOME SCREEN ── */
#screenHome{background:var(--bg)}
.h-section{padding:0 14px;flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.h-section::-webkit-scrollbar{display:none}
.h-group-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;
  color:var(--muted);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.h-group-title::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border2),transparent)}
.h-card{background:linear-gradient(135deg,rgba(28,28,28,.9),rgba(20,20,20,.95));
  border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;
  cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;
  position:relative;overflow:hidden}
.h-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--red),var(--red2));
  transform:scaleY(0);transition:transform .2s;transform-origin:bottom;
  box-shadow:2px 0 8px var(--red-glow)}
.h-card:active{background:linear-gradient(135deg,rgba(36,36,36,.9),rgba(28,28,28,.95));transform:scale(0.99)}
.h-card:active::before{transform:scaleY(1)}
.h-card-icon{font-size:24px;flex-shrink:0;width:42px;height:42px;
  background:linear-gradient(145deg,var(--bg4),var(--bg3));
  border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
.h-card-info{flex:1;min-width:0}
.h-card-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);line-height:1.1}
.h-card-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;font-weight:600}
.h-badge-sm{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.h-badge-sm.i{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.h-badge-sm.m-level{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.h-badge-sm.a{background:rgba(225,29,72,.1);color:#fb7185;border:1px solid rgba(225,29,72,.2)}
.h-badge-sm.s{background:rgba(236,72,153,.1);color:#f472b6;border:1px solid rgba(236,72,153,.2)}

/* ── PLAN SCREEN ── */
#screenPlan{background:var(--bg)}
.p-header{background:rgba(13,13,13,.95);flex-shrink:0;border-bottom:1px solid var(--border);position:relative}
.p-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,12px) 16px 10px}
.p-title{flex:1;min-width:0}
.p-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:10px;color:var(--muted);margin-top:1px;font-weight:600;letter-spacing:.05em}
.p-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted);flex-shrink:0;font-weight:700}
.p-pill span{color:var(--red)}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:15px;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--red);text-shadow:0 0 12px rgba(225,29,72,.4)}
.pbar-wrap{padding:0 16px 8px;display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red2));border-radius:2px;transition:width .4s ease;
  box-shadow:0 0 8px rgba(225,29,72,.5)}
.pbar-pct{font-size:11px;color:var(--muted);font-weight:700;min-width:28px;text-align:right}
.elist{flex:1;overflow-y:auto;padding:10px 14px 16px;-webkit-overflow-scrolling:touch}
.elist::-webkit-scrollbar{display:none}
.e-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:var(--muted);margin-bottom:12px;padding-top:4px}

/* ── EXERCISE CARD ── */
.ecard{
  background:linear-gradient(135deg,rgba(24,24,24,.95),rgba(18,18,18,.98));
  border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;margin-bottom:8px;transition:all .18s;position:relative;overflow:hidden}
.ecard::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(225,29,72,.06),transparent);opacity:0;transition:opacity .18s}
.ecard:active{transform:scale(0.985);border-color:var(--border2)}
.ecard:active::before{opacity:1}
.ecard.done{border-color:rgba(225,29,72,.4);background:linear-gradient(135deg,rgba(159,15,46,.12),rgba(18,18,18,.98))}
.ecard.done::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--red),var(--red2));box-shadow:2px 0 8px var(--red-glow)}

/* ── EXERCISE EMOJI AVATAR ── */
.e-avatar{width:44px;height:44px;border-radius:10px;
  background:linear-gradient(145deg,rgba(225,29,72,.15),rgba(225,29,72,.05));
  border:1px solid rgba(225,29,72,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;line-height:1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
.ecard.done .e-avatar{background:linear-gradient(145deg,rgba(225,29,72,.25),rgba(225,29,72,.1));
  border-color:rgba(225,29,72,.4)}

.e-num{width:44px;height:44px;border-radius:10px;
  background:linear-gradient(145deg,var(--bg4),var(--bg3));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted);flex-shrink:0;letter-spacing:1px}
.e-num.dn{background:linear-gradient(145deg,rgba(225,29,72,.2),rgba(225,29,72,.08));
  border-color:rgba(225,29,72,.4);color:var(--red2)}
.e-info{flex:1;min-width:0}
.e-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
.e-sub{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.03em}
.e-play{width:36px;height:36px;border-radius:8px;
  background:linear-gradient(145deg,var(--red),var(--red-dark));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
  box-shadow:0 2px 10px rgba(225,29,72,.35)}
.e-play svg{width:12px;height:12px;fill:#fff;margin-left:2px}
.e-done{width:36px;height:36px;border-radius:8px;
  background:rgba(225,29,72,.12);border:1px solid rgba(225,29,72,.3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.e-done svg{width:14px;height:14px;stroke:var(--red2);fill:none;stroke-width:2.5}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.96);z-index:100;flex-direction:column}
.modal-bg.open{display:flex}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,16px) 16px 14px;flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:rgba(13,13,13,.98)}
.modal-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;
  color:var(--text);flex:1;padding-right:12px;line-height:1.2}
.modal-close{width:36px;height:36px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:18px;font-weight:700;flex-shrink:0}
.vid-wrap{width:100%;background:#fff;flex-shrink:0;position:relative}
.gif-box{width:100%;height:260px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f8f8f8;position:relative}
.gif-box img{width:100%;height:100%;object-fit:contain;display:block}
.gif-spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;width:100%;height:100%;background:#f8f8f8}
.gif-spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#e11d48;border-radius:50%;animation:gifSpin .7s linear infinite}
.gif-spinner-txt{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.15em;text-transform:uppercase}
.gif-err{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;height:100%;background:#f8f8f8}
.gif-err-icon{font-size:48px}
.gif-err-txt{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.1em;text-transform:uppercase}
.gif-muscles{position:absolute;bottom:6px;left:8px;display:flex;flex-wrap:wrap;gap:4px;max-width:80%}
.gif-muscle-tag{background:rgba(225,29,72,.85);border-radius:3px;padding:2px 7px;font-size:9px;font-weight:700;color:#fff;letter-spacing:.06em;text-transform:uppercase}
@keyframes gifSpin{to{transform:rotate(360deg)}}
.modal-body{padding:14px 16px;flex:1;overflow-y:auto;background:var(--bg)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:linear-gradient(145deg,var(--bg3),var(--bg2));
  border:1px solid var(--border2);border-radius:10px;padding:12px;text-align:center;
  position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(225,29,72,.3),transparent)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--red2)}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:2px;font-weight:700}
.modal-acts{display:flex;gap:8px;padding-bottom:env(safe-area-inset-bottom,8px)}
.btn-done{flex:1;padding:15px;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .15s;
  box-shadow:0 4px 16px rgba(225,29,72,.35)}
.btn-done:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(225,29,72,.25)}
.btn-done.un{background:var(--bg3);color:var(--muted);border:1px solid var(--border2);box-shadow:none}
.btn-next{padding:15px 18px;background:linear-gradient(145deg,var(--bg3),var(--bg2));
  color:var(--text);border:1px solid var(--border2);border-radius:10px;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.btn-next:active{transform:scale(0.97)}
.no-vid{display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(225,29,72,.3)}50%{box-shadow:0 0 20px rgba(225,29,72,.6)}}
.screen.active .g-logo{animation:fadeUp .35s ease both}
.screen.active .g-tagline{animation:fadeUp .35s ease .06s both}
.screen.active .g-label{animation:fadeUp .35s ease .12s both}
.screen.active .g-cards{animation:fadeUp .35s ease .18s both}
</style>
</head>
<body>

<!-- GENDER -->
<div class="screen active" id="screenGender">
  <div class="gym-bg"></div>
  <div class="diag"></div>
  <div class="g-hero">
    <div class="g-logo">Treino<em>Pro</em></div>
    <div class="g-tagline">Seu treino. Sua evolução.</div>
    <div class="g-label">Selecione seu perfil</div>
    <div class="g-cards">
      <div class="g-card" onclick="setGender('m')">
        <div class="g-card-icon">💪</div>
        <div class="g-card-name">Homens</div>
        <div class="g-card-desc">Hipertrofia e força muscular</div>
        <div class="g-card-line"></div>
      </div>
      <div class="g-card" onclick="setGender('f')">
        <div class="g-card-icon">🏋️</div>
        <div class="g-card-name">Mulheres</div>
        <div class="g-card-desc">Glúteos, definição e hipertrofia</div>
        <div class="g-card-line"></div>
      </div>
    </div>
  </div>
  <div class="g-footer"><a href="https://github.com/romariomrk" target="_blank">github.com/romariomrk</a></div>
</div>

<!-- HOME -->
<div class="screen" id="screenHome">
  <div class="gym-bg"></div>
  <div class="p-header">
    <div class="diag"></div>
    <div class="h-topbar" style="padding:env(safe-area-inset-top,12px) 16px 12px">
      <div class="h-back" onclick="goGender()">←</div>
      <div class="h-logo">Treino<em>Pro</em></div>
      <div class="h-badge" id="genderBadge"></div>
    </div>
  </div>
  <div class="h-section" id="levelSection"></div>
</div>

<!-- PLAN -->
<div class="screen" id="screenPlan">
  <div class="gym-bg"></div>
  <div class="p-header">
    <div class="diag"></div>
    <div class="p-topbar">
      <div class="p-back" onclick="goHome()">←</div>
      <div class="p-title">
        <div class="p-name" id="planName"></div>
        <div class="p-meta" id="planMeta"></div>
      </div>
      <div class="p-pill" id="pill">0/<span>0</span></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="pbar-wrap">
      <div class="pbar"><div class="pbar-fill" id="pfill" style="width:0%"></div></div>
      <div class="pbar-pct" id="ppct">0%</div>
    </div>
  </div>
  <div class="elist" id="elist"></div>
</div>

<!-- MODAL -->

let gender=null,curPlan=null,curTab=0,curIdx=null,done={};
function dk(p,t,i){return p+'-'+t+'-'+i;}

function setGender(g){
  gender=g;
  const menu=MENUS[g];
  document.getElementById('genderBadge').textContent=menu.badge;
  document.getElementById('genderBadge').className='h-badge '+menu.cls;
  const plans=g==='m'?PLANS_H:PLANS_F;
  const labels=menu.labels;
  let html='';
  menu.groups.forEach(grp=>{
    html+=`<div class="h-group-title">${grp.title}</div>`;
    grp.plans.forEach(pid=>{
      const l=labels[pid];
      html+=`<div class="h-card" onclick="openPlan('${pid}')">
        <div class="h-card-icon">${l.icon}</div>
        <div class="h-card-info">
          <div class="h-card-name">${l.name}</div>
          <div class="h-card-desc">${l.desc}</div>
        </div>
        <div class="h-badge-sm ${l.cls}">${l.badge}</div>
      </div>`;
    });
  });
  document.getElementById('levelSection').innerHTML=html;
  document.getElementById('screenGender').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function goGender(){
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenGender').classList.add('active');
}

function openPlan(id){
  curPlan=id;curTab=0;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const p=plans[id];
  document.getElementById('planName').textContent=p.name;
  document.getElementById('planMeta').textContent=p.meta;
  renderTabs();renderList();
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenPlan').classList.add('active');
  document.getElementById('elist').scrollTop=0;
  preCacheTab();
}

function goHome(){
  document.getElementById('screenPlan').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function renderTabs(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  document.getElementById('tabs').innerHTML=plans[curPlan].treinos.map((t,i)=>
    `<div class="tab${i===curTab?' active':''}" onclick="setTab(${i})">${t.label}</div>`).join('');
}

function setTab(i){curTab=i;renderTabs();renderList();document.getElementById('elist').scrollTop=0;preCacheTab();}

function renderList(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  const dc=t.exercises.filter((_,i)=>done[dk(curPlan,curTab,i)]).length;
  const pct=Math.round(dc/t.exercises.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pill').innerHTML=dc+'/<span>'+t.exercises.length+'</span>';
  document.getElementById('elist').innerHTML=
    `<div class="e-label">${t.label} — ${t.sub}</div>`+
    t.exercises.map((ex,i)=>{
      const isDone=!!done[dk(curPlan,curTab,i)];
      return `<div class="ecard${isDone?' done':''}" onclick="openModal(${i})">
        <div class="e-avatar">${exEmoji(ex.vid)}</div>
        <div class="e-info">
          <div class="e-name">${ex.name}</div>
          <div class="e-sub">${ex.sets} séries · ${ex.reps} reps · ${ex.rest}</div>
        </div>
        <div class="${isDone?'e-done':'e-play'}">${isDone?'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'}</div>
      </div>`;
    }).join('');
}

function getExerciseData(vidKey) {
  const path = GIF_MAP[vidKey];
  if (!path) return null;
  return { gifUrl: BASE + path, muscles: [] };
}

function preCacheTab() {} // no-op, images load instantly from static URLs


function renderGifResult(exName, result) {
  if (!result || !result.gifUrl) {
    document.getElementById('vwrap').innerHTML =
      `<div class="gif-box"><div class="gif-err">
        <div class="gif-err-icon">🏋️</div>
        <div class="gif-err-txt">${exName}</div>
      </div></div>`;
    return;
  }
  document.getElementById('vwrap').innerHTML =
    `<div class="gif-box">
      <img src="${result.gifUrl}" alt="${exName}" loading="eager"
           onerror="this.parentElement.innerHTML='<div class=\'gif-err\'><div class=\'gif-err-icon\'>🏋️</div><div class=\'gif-err-txt\'>${exName}</div></div>'">
    </div>`;
}

function openModal(idx) {
  curIdx = idx;
  const plans = gender === 'm' ? PLANS_H : PLANS_F;
  const ex = plans[curPlan].treinos[curTab].exercises[idx];
  document.getElementById('mtitle').textContent = ex.name;
  renderGifResult(ex.name, getExerciseData(ex.vid));
  }

  document.getElementById('mstats').innerHTML =
    `<div class="stat"><div class="stat-val">${ex.sets}</div><div class="stat-lbl">Séries</div></div>
     <div class="stat"><div class="stat-val">${ex.reps}</div><div class="stat-lbl">Reps</div></div>
     <div class="stat"><div class="stat-val">${ex.rest}</div><div class="stat-lbl">Descanso</div></div>`;
  const isDone = !!done[dk(curPlan, curTab, idx)];
  const b = document.getElementById('bdone');
  b.textContent = isDone ? 'DESMARCAR' : 'MARCAR FEITO';
  b.className = 'btn-done' + (isDone ? ' un' : '');
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('vwrap').innerHTML = '';
}

function toggleDone() {
  const k = dk(curPlan, curTab, curIdx);
  done[k] = !done[k];
  if (!done[k]) delete done[k];
  const isDone = !!done[k];
  const b = document.getElementById('bdone');
  b.textContent = isDone ? 'DESMARCAR' : 'MARCAR FEITO';
  b.className = 'btn-done' + (isDone ? ' un' : '');
  renderList();
}

function nextEx() {
  const plans = gender === 'm' ? PLANS_H : PLANS_F;
  const t = plans[curPlan].treinos[curTab];
  closeModal();
  setTimeout(() => openModal((curIdx + 1) % t.exercises.length), 150);
}
