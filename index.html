<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff1744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TreinoPro">
<title>💪 TreinoPro</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff1744;--red2:#ff5252;--red-dark:#d50000;
  --orange:#ff6e40;--yellow:#ffd600;--purple:#d500f9;--blue:#00b0ff;
  --bg:#000;--bg2:#0a0a0a;--bg3:#1a1a1a;--bg4:#2a2a2a;
  --border:#2a2a2a;--border2:#444;
  --text:#fff;--muted:#999;--faint:#444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);overflow:hidden}
body{display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* ── GRADIENT ACCENTS ── */
.diag{position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow));
  box-shadow:0 0 20px rgba(255,23,68,.6)}
.diag-bottom{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--purple),var(--blue),var(--red))}

/* ── GENDER SCREEN ── */
#screenGender{background:linear-gradient(135deg,#000,#1a0d0d,#000);position:relative;overflow:hidden}
#screenGender::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(circle at 50% 50%,rgba(255,23,68,.15),transparent 70%);pointer-events:none}
.g-hero{flex:1;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 20px 0;position:relative;overflow:hidden;z-index:1}
.g-hero::before{content:'GYM';position:absolute;right:-20px;top:50%;transform:translateY(-55%) rotate(90deg);
  font-family:'Bebas Neue',sans-serif;font-size:200px;
  background:linear-gradient(135deg,rgba(255,23,68,.08),rgba(255,110,64,.08));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  pointer-events:none;letter-spacing:12px;white-space:nowrap}
.g-logo{font-family:'Bebas Neue',sans-serif;font-size:58px;letter-spacing:4px;line-height:1;
  background:linear-gradient(135deg,#fff,#ffaaaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;filter:drop-shadow(0 0 20px rgba(255,23,68,.4))}
.g-logo em{background:linear-gradient(135deg,var(--red),var(--orange));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;font-style:normal;filter:drop-shadow(0 0 30px rgba(255,23,68,.8))}
.g-tagline{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-bottom:32px}
.g-label{font-size:12px;font-weight:700;
  background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.g-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;max-height:280px;margin-bottom:20px}
.g-card{border-radius:16px;border:2px solid transparent;
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;transition:all .3s cubic-bezier(0.4,0,0.2,1);padding:24px 18px;position:relative;overflow:hidden}
.g-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,23,68,.15),rgba(255,110,64,.15));opacity:0;transition:opacity .3s}
.g-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,23,68,.2));opacity:0;transition:opacity .3s}
.g-card:active{transform:scale(0.95);border-color:var(--red)}
.g-card:active::before,.g-card:active::after{opacity:1}
.g-card-icon{font-size:48px;filter:drop-shadow(0 0 20px rgba(255,23,68,.6));
  transform:scale(1);transition:transform .3s}
.g-card:active .g-card-icon{transform:scale(1.1)}
.g-card-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  background:linear-gradient(135deg,#fff,#ffcccc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.g-card-desc{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;font-weight:600}
.g-card-line{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),var(--orange));transform:scaleX(0);transition:transform .3s;transform-origin:left;
  box-shadow:0 0 15px rgba(255,23,68,.8)}
.g-card:active .g-card-line{transform:scaleX(1)}
.g-footer{text-align:center;padding:12px 0 env(safe-area-inset-bottom,14px);font-size:11px;color:var(--faint)}
.g-footer a{color:#555;text-decoration:none;letter-spacing:.05em;transition:color .3s}

/* ── HOME SCREEN ── */
#screenHome{background:linear-gradient(135deg,#000,#0d0a0a)}
.h-header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);position:relative;
  box-shadow:0 4px 20px rgba(255,23,68,.15)}
.h-header .diag{top:0}
.h-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,14px) 18px 14px}
.h-back{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);
  flex-shrink:0;font-weight:700;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.h-back:active{transform:scale(0.92);background:linear-gradient(135deg,var(--red-dark),var(--red))}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;flex:1;
  background:linear-gradient(135deg,#fff,#ffaaaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-logo em{background:linear-gradient(135deg,var(--red),var(--orange));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;font-style:normal}
.h-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;letter-spacing:.1em;
  text-transform:uppercase;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.h-badge.m{background:linear-gradient(135deg,rgba(0,176,255,.25),rgba(0,176,255,.15));color:#60d5fa;
  border:1px solid rgba(0,176,255,.4)}
.h-badge.f{background:linear-gradient(135deg,rgba(236,72,153,.25),rgba(236,72,153,.15));color:#ff80d0;
  border:1px solid rgba(236,72,153,.4)}
.h-section{padding:0 18px;flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch}
.h-section::-webkit-scrollbar{display:none}
.h-group-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;
  background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:24px 0 12px;display:flex;align-items:center;gap:12px;filter:drop-shadow(0 0 10px rgba(255,23,68,.3))}
.h-group-title::after{content:'';flex:1;height:2px;
  background:linear-gradient(90deg,var(--red),transparent)}
.h-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;
  transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,.3)}
.h-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--red),var(--orange));transform:scaleY(0);
  transition:transform .3s;transform-origin:bottom;box-shadow:0 0 15px rgba(255,23,68,.8)}
.h-card:active{background:linear-gradient(135deg,var(--bg3),var(--bg4));transform:scale(0.98);
  border-color:var(--red);box-shadow:0 6px 25px rgba(255,23,68,.4)}
.h-card:active::before{transform:scaleY(1)}
.h-card-icon{font-size:28px;flex-shrink:0;width:48px;height:48px;
  background:linear-gradient(135deg,rgba(255,23,68,.15),rgba(255,110,64,.1));border-radius:10px;
  display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,23,68,.3);
  filter:drop-shadow(0 0 15px rgba(255,23,68,.4))}
.h-card-info{flex:1;min-width:0}
.h-card-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;
  background:linear-gradient(90deg,#fff,#ffcccc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2}
.h-card-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;font-weight:600}
.h-badge-sm{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.08em;
  text-transform:uppercase;flex-shrink:0;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.h-badge-sm.i{background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(34,197,94,.1));color:#5fff8d;
  border:1px solid rgba(34,197,94,.3)}
.h-badge-sm.m-level{background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(168,85,247,.1));color:#d0a0ff;
  border:1px solid rgba(168,85,247,.3)}
.h-badge-sm.a{background:linear-gradient(135deg,rgba(255,23,68,.2),rgba(255,23,68,.1));color:#ff8099;
  border:1px solid rgba(255,23,68,.3)}
.h-badge-sm.s{background:linear-gradient(135deg,rgba(236,72,153,.2),rgba(236,72,153,.1));color:#ffa0d0;
  border:1px solid rgba(236,72,153,.3)}

/* ── PLAN SCREEN ── */
#screenPlan{background:linear-gradient(135deg,#000,#0d0a0a)}
.p-header{background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);position:relative;
  box-shadow:0 4px 20px rgba(255,23,68,.15)}
.p-header .diag{top:0}
.p-topbar{display:flex;align-items:center;gap:10px;padding:env(safe-area-inset-top,14px) 18px 12px}
.p-back{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text);
  flex-shrink:0;font-weight:700;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.p-back:active{transform:scale(0.92);background:linear-gradient(135deg,var(--red-dark),var(--red))}
.p-title{flex:1;min-width:0}
.p-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  background:linear-gradient(90deg,#fff,#ffcccc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-meta{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.05em}
.p-pill{background:linear-gradient(135deg,rgba(255,23,68,.15),rgba(255,23,68,.08));
  border:1px solid rgba(255,23,68,.3);border-radius:20px;padding:5px 14px;font-size:13px;
  color:var(--muted);flex-shrink:0;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.p-pill span{background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:12px 18px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;
  color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:var(--red);
  background:linear-gradient(180deg,transparent,rgba(255,23,68,.08));
  text-shadow:0 0 20px rgba(255,23,68,.6)}
.pbar-wrap{padding:0 18px 10px;display:flex;align-items:center;gap:12px}
.pbar{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.5)}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow));
  border-radius:3px;transition:width .4s ease;box-shadow:0 0 15px rgba(255,23,68,.6)}
.pbar-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right;
  background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.elist{flex:1;overflow-y:auto;padding:12px 18px 18px;-webkit-overflow-scrolling:touch}
.elist::-webkit-scrollbar{display:none}
.e-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;
  background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:14px;padding-top:6px;filter:drop-shadow(0 0 10px rgba(255,23,68,.3))}
.ecard{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);
  border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;
  transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,.3)}
.ecard:active{background:linear-gradient(135deg,var(--bg3),var(--bg4));transform:scale(0.98);
  box-shadow:0 6px 25px rgba(255,23,68,.3)}
.ecard.done{border-color:var(--red);background:linear-gradient(135deg,rgba(213,0,0,.12),rgba(255,23,68,.08));
  box-shadow:0 4px 20px rgba(255,23,68,.4)}
.ecard.done::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--red),var(--orange));box-shadow:0 0 15px rgba(255,23,68,.8)}
.e-num{width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;
  font-size:18px;color:var(--muted);flex-shrink:0;letter-spacing:1px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.5)}
.e-num.dn{background:linear-gradient(135deg,rgba(255,23,68,.25),rgba(255,110,64,.15));
  border-color:var(--red);color:var(--red2);box-shadow:0 0 20px rgba(255,23,68,.5)}
.e-info{flex:1;min-width:0}
.e-name{font-size:15px;font-weight:700;
  background:linear-gradient(90deg,#fff,#ffdddd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.4}
.e-sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.02em}
.e-play{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--red),var(--orange));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;
  box-shadow:0 4px 15px rgba(255,23,68,.6)}
.e-play:active{transform:scale(0.9);box-shadow:0 6px 25px rgba(255,23,68,.8)}
.e-play svg{width:14px;height:14px;fill:#fff;margin-left:2px}
.e-done{width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(255,23,68,.2),rgba(255,110,64,.15));
  border:1px solid var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 20px rgba(255,23,68,.5)}
.e-done svg{width:16px;height:16px;stroke:var(--red2);fill:none;stroke-width:3}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:100;flex-direction:column;
  backdrop-filter:blur(10px)}
.modal-bg.open{display:flex}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,18px) 18px 16px;flex-shrink:0;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--bg),var(--bg2));position:relative}
.modal-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow))}
.modal-ttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;
  background:linear-gradient(90deg,#fff,#ffcccc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex:1;padding-right:12px;line-height:1.3}
.modal-close{width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);
  font-size:20px;font-weight:700;flex-shrink:0;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.modal-close:active{background:linear-gradient(135deg,var(--red-dark),var(--red));transform:scale(0.9)}
.vid-wrap{width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0;
  box-shadow:0 8px 30px rgba(0,0,0,.6)}
.vid-wrap iframe{width:100%;height:100%;border:none;display:block}
.modal-body{padding:16px 18px;flex:1;overflow-y:auto}
.gif-preview{width:100%;max-width:400px;margin:0 auto 16px;border-radius:12px;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,23,68,.12),rgba(255,23,68,.06));
  border:2px solid rgba(255,23,68,.3);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.gif-preview img{width:100%;height:auto;display:block}
.gif-label{text-align:center;padding:8px;font-size:11px;color:var(--muted);font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;background:rgba(0,0,0,.3)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:linear-gradient(135deg,rgba(255,23,68,.12),rgba(255,23,68,.06));
  border:1px solid rgba(255,23,68,.3);border-radius:10px;padding:14px;text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,.3)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--red2),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 10px rgba(255,23,68,.4))}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:3px;font-weight:700}
.modal-acts{display:flex;gap:10px;padding-bottom:env(safe-area-inset-bottom,10px)}
.btn-done{flex:1;padding:16px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;
  border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;
  cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(255,23,68,.6);font-weight:700}
.btn-done:active{background:linear-gradient(135deg,var(--red-dark),var(--red));
  transform:scale(0.96);box-shadow:0 6px 30px rgba(255,23,68,.8)}
.btn-done.un{background:linear-gradient(135deg,var(--bg3),var(--bg4));color:var(--muted);
  border:1px solid var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.5)}
.btn-next{padding:16px 20px;background:linear-gradient(135deg,var(--bg3),var(--bg4));color:var(--text);
  border:1px solid var(--border2);border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:1px;cursor:pointer;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.btn-next:active{transform:scale(0.96);border-color:var(--red)}
.no-vid{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);
  font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,23,68,.4)}50%{box-shadow:0 0 35px rgba(255,23,68,.8)}}
.screen.active .g-logo,.screen.active .g-tagline,.screen.active .g-label,.screen.active .g-cards{animation:fadeUp .5s ease both}
.screen.active .g-tagline{animation-delay:.08s}
.screen.active .g-label{animation-delay:.15s}
.screen.active .g-cards{animation-delay:.22s}
.g-logo em{animation:glow 2s ease-in-out infinite}
</style>
</head>
<body>

<!-- GENDER -->
<div class="screen active" id="screenGender">
  <div class="diag"></div>
  <div class="g-hero">
    <div class="g-logo">Treino<em>Pro</em></div>

let gender=null,curPlan=null,curTab=0,curIdx=null,done={};
function dk(p,t,i){return p+'-'+t+'-'+i;}

function setGender(g){
  gender=g;
  const menu=MENUS[g];
  document.getElementById('genderBadge').textContent=menu.badge;
  document.getElementById('genderBadge').className='h-badge '+menu.cls;
  const plans=g==='m'?PLANS_H:PLANS_F;
  const labels=menu.labels;
  let html='';
  menu.groups.forEach(grp=>{
    html+=`<div class="h-group-title">${grp.title}</div>`;
    grp.plans.forEach(pid=>{
      const l=labels[pid];
      html+=`<div class="h-card" onclick="openPlan('${pid}')">
        <div class="h-card-icon">${l.icon}</div>
        <div class="h-card-info">
          <div class="h-card-name">${l.name}</div>
          <div class="h-card-desc">${l.desc}</div>
        </div>
        <div class="h-badge-sm ${l.cls}">${l.badge}</div>
      </div>`;
    });
  });
  document.getElementById('levelSection').innerHTML=html;
  document.getElementById('screenGender').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function goGender(){
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenGender').classList.add('active');
}

function openPlan(id){
  curPlan=id;curTab=0;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const p=plans[id];
  document.getElementById('planName').textContent=p.name;
  document.getElementById('planMeta').textContent=p.meta;
  renderTabs();renderList();
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenPlan').classList.add('active');
  document.getElementById('elist').scrollTop=0;
}

function goHome(){
  document.getElementById('screenPlan').classList.remove('active');
  document.getElementById('screenHome').classList.add('active');
}

function renderTabs(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  document.getElementById('tabs').innerHTML=plans[curPlan].treinos.map((t,i)=>
    `<div class="tab${i===curTab?' active':''}" onclick="setTab(${i})">${t.label}</div>`).join('');
}

function setTab(i){curTab=i;renderTabs();renderList();document.getElementById('elist').scrollTop=0;}

function renderList(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  const dc=t.exercises.filter((_,i)=>done[dk(curPlan,curTab,i)]).length;
  const pct=Math.round(dc/t.exercises.length*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pill').innerHTML=dc+'/<span>'+t.exercises.length+'</span>';
  document.getElementById('elist').innerHTML=
    `<div class="e-label">${t.label} — ${t.sub}</div>`+
    t.exercises.map((ex,i)=>{
      const isDone=!!done[dk(curPlan,curTab,i)];
      return `<div class="ecard${isDone?' done':''}" onclick="openModal(${i})">
        <div class="e-num${isDone?' dn':''}">${i+1}</div>
        <div class="e-info">
          <div class="e-name">${ex.name}</div>
          <div class="e-sub">${ex.sets} séries · ${ex.reps} reps · ${ex.rest}</div>
        </div>
        <div class="${isDone?'e-done':'e-play'}">${isDone?'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>'}</div>
      </div>`;
    }).join('');
}

function openModal(idx){
  curIdx=idx;
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const ex=plans[curPlan].treinos[curTab].exercises[idx];
  const ytId=YT[ex.vid]||'';
  const gifUrl=GIFS[ex.vid]||'';
  
  document.getElementById('mtitle').textContent=ex.name;
  
  document.getElementById('vwrap').innerHTML=ytId
    ?`<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&playsinline=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`
    :`<div class="no-vid">🎬 Vídeo em breve</div>`;
  
  document.getElementById('gifpreview').innerHTML=gifUrl
    ?`<img src="${gifUrl}" alt="${ex.name}"><div class="gif-label">🎯 Preview do Movimento</div>`
    :'';
  
  document.getElementById('mstats').innerHTML=
    `<div class="stat"><div class="stat-val">${ex.sets}</div><div class="stat-lbl">Séries</div></div>
     <div class="stat"><div class="stat-val">${ex.reps}</div><div class="stat-lbl">Reps</div></div>
     <div class="stat"><div class="stat-val">${ex.rest}</div><div class="stat-lbl">Descanso</div></div>`;
  const isDone=!!done[dk(curPlan,curTab,idx)];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'DESMARCAR':'MARCAR FEITO';
  b.className='btn-done'+(isDone?' un':'');
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('vwrap').innerHTML='';
}

function toggleDone(){
  const k=dk(curPlan,curTab,curIdx);
  done[k]=!done[k];
  if(!done[k])delete done[k];
  const isDone=!!done[k];
  const b=document.getElementById('bdone');
  b.textContent=isDone?'DESMARCAR':'MARCAR FEITO';
  b.className='btn-done'+(isDone?' un':'');
  renderList();
}

function nextEx(){
  const plans=gender==='m'?PLANS_H:PLANS_F;
  const t=plans[curPlan].treinos[curTab];
  closeModal();
  setTimeout(()=>openModal((curIdx+1)%t.exercises.length),150);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
